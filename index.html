<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoApp</title>
    <!-- Manifiesto para que se vea como App al instalar -->
    <link rel="manifest" href='data:application/json,{"name":"InmoApp","short_name":"InmoApp","start_url":"./index.html","display":"standalone","background_color":"#f8fafc","theme_color":"#4f46e5"}'>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4f46e5; }
        body { background-color: #f8fafc; font-family: sans-serif; }
        .input-style { transition: all 0.3s ease; border: 1.5px solid #e2e8f0; }
        .input-style:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
        <h2 class="text-3xl font-extrabold text-slate-900">Registro</h2>
        <div class="h-1.5 w-16 bg-indigo-500 rounded-full mt-2 mb-8"></div>

        <form id="propertyForm" class="space-y-5">
            <input type="text" name="titulo" required placeholder="Título de la propiedad" class="w-full px-4 py-3 rounded-xl input-style outline-none">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" name="precio" required placeholder="Precio" class="w-full px-4 py-3 rounded-xl input-style outline-none">
                <select name="operacion" class="w-full px-4 py-3 rounded-xl input-style outline-none bg-white">
                    <option>Venta</option>
                    <option>Alquiler</option>
                </select>
            </div>
            <textarea name="descripcion" rows="3" required placeholder="Descripción..." class="w-full px-4 py-3 rounded-xl input-style outline-none"></textarea>
            
            <input type="file" name="fotos" multiple accept="image/*" required class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700">
            
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">Generar</button>
        </form>
        <div id="status" class="mt-4 hidden p-4 rounded-xl text-center font-bold"></div>
    </div>

    <script>
        // Webhook configurado correctamente:
        const WEBHOOK_URL = "https://hook.us2.make.com/eig9p1leym1jywbgjddo6u1vy93dls6y"; 

        document.getElementById('propertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            btn.disabled = true; 
            btn.innerText = 'Procesando...';
            
            try {
                const response = await fetch(WEBHOOK_URL, { method: 'POST', body: new FormData(e.target) });
                if(response.ok) {
                    status.innerText = "¡Enviado a Make!"; 
                    status.className = "mt-4 p-4 rounded-xl text-center font-bold bg-green-100 text-green-700";
                    e.target.reset();
                } else {
                    throw new Error('Error');
                }
            } catch (err) {
                status.innerText = "Error al enviar."; 
                status.className = "mt-4 p-4 rounded-xl text-center font-bold bg-red-100 text-red-700";
            } finally {
                btn.disabled = false; 
                btn.innerText = 'Generar'; 
                status.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
